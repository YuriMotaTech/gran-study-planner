name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run test -- --run
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: gran_study
          MYSQL_USER: gran
          MYSQL_PASSWORD: gran
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Backend migrate and serve
        working-directory: backend
        env:
          CORS_ALLOW_ORIGIN: http://127.0.0.1:5173
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: gran_study
          DB_USER: gran
          DB_PASSWORD: gran
        run: |
          composer install --no-interaction --prefer-dist
          php bin/migrate.php
          php -S 127.0.0.1:8080 -t public &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8080/health && exit 0
            sleep 1
          done
          exit 1
      - name: Frontend build and preview
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8080
        run: |
          npm ci
          npm run build
          npx vite preview --port 5173 --host 127.0.0.1 &
          for i in $(seq 1 40); do
            curl -sf -o /dev/null http://127.0.0.1:5173 && exit 0
            sleep 1
          done
          exit 1
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: npm run test:e2e
